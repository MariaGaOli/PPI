
<!DOCTYPE html>
<html>
<head>
    <title>Formulário</title>

    <style>
        body{
            font-family: Verdana, Geneva, Tahoma, sans-serif;
        }
        .error {
            color: red;
        }
    </style>

</head>
<body>
    <h2>Inscrição de formulário</h2>
    
    <form name="Formu" onsubmit="return validateForm()" method="POST">

        <label for="name">Nome:</label>
        <br>
        <input type="text" id="nome" name="nome" required>

        <br>
        <br>

        <label for="sobrenome">Sobrenome:</label>
        <br>
        <input type="text" id="sobrenome" name="sobrenome" required>

        <br>
        <br>

        <label for="data">Data de Nascimento</label>
        <br>
        <input type="date" id="data" name="data" required>

        <br>
        <br>

        <label for="name">CPF:</label>
        <br>
        <input type="text" id="cpf" name="cpf" required>

        <br>
        <br>

        <label for="email">Email:</label>
        <br>
        <input type="email" id="email" name="email" required>

        <br>
        <br>

        <input type="submit" value="Enviar">
    </form>

    <script>
        function validateForm() {
            let nome = document.forms["Formu"]["nome"].value;
            let sobrenome = document.forms["Formu"]["sobrenome"].value;
            let data = document.forms["Formu"]["data"].value;
            let cpf = document.forms["Formu"]["cpf"].value;
            let email = document.forms["Formu"]["email"].value;
            

            if (nome == "") {
                alert("Por favor, preencha o nome.");
                return false;
            }

            if (sobrenome == "") {
                alert("Por favor, preencha o sobrenome.");
                return false;
            }

            if (data == "") {
                alert("Por favor, preencha a data de nascimento.");
                return false;
            }

            if (cpf == "") {
                alert("Por favor, preencha o cpf.");
                return false;
            }

            if (email == "") {
                alert("Por favor, preencha o email.");
                return false;
            }

           else return true;
        }
    </script>
</body>
</html>
